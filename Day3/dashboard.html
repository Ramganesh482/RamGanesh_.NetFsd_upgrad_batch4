<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
}

.container{
display:flex;
}

.sidebar{
background:#333;
color:white;
width:200px;
padding:20px;
}

.main{
flex:1;
padding:20px;
display:flex;
flex-wrap:wrap;
}

.card{
border:1px solid #ccc;
padding:20px;
margin:10px;
flex:1 1 30%;
}

/* Mobile */
@media(max-width:600px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
text-align:center;
}

.main{
flex-direction:column;
}

}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">
<h3>Dashboard</h3>
<p>Home</p>
<p>Users</p>
<p>Settings</p>
</div>

<div class="main">

<div class="card">Total Users</div>
<div class="card">Revenue</div>
<div class="card">Orders</div>

</div>

</div>

</body>
</html>
