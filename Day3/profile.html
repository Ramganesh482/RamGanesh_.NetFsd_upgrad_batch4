<!DOCTYPE html>
<html>
<head>
<title>Profile Card</title>
<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
margin-top:50px;
}

.card{
background:#f4f4f4;
padding:20px;
border:1px solid #ccc;
border-radius:10px;
width:250px;
text-align:center;
}

.card h2{
letter-spacing:1px;
}

.card p{
line-height:1.5;
}

button{
padding:10px 15px;
border:none;
background:blue;
color:white;
border-radius:5px;
}

button:hover{
background:darkblue;
}

</style>
</head>

<body>

<div class="card">
<h2>Ganesh</h2>
<h4>Java Developer</h4>
<p>Passionate developer learning full stack technologies.</p>
<button>Contact</button>
</div>

</body>
</html>
