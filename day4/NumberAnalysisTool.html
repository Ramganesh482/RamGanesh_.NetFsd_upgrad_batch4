<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

let num = 7;

/* Ternary Operator */
let result = (num >= 0) ? "Positive Number" : "Negative Number";
console.log(result);

/* Even or Odd */
if(num % 2 === 0){
console.log("Even Number");
}
else{
console.log("Odd Number");
}

/* Loop from 1 to number */
for(let i = 1; i <= num; i++){
console.log(i);
}

</script>
</body>
</html>
