<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

let marks = 72;
let grade;

if(marks >= 75){
    grade = "A";
}
else if(marks >= 60){
    grade = "B";
}
else if(marks >= 40){
    grade = "C";
}
else{
    grade = "Fail";
}

console.log("Marks:", marks);
console.log("Grade:", grade);

</script>
</body>
</html>
