<!DOCTYPE html>
<html>
<head>
<title>Feedback</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:100px;
}

button{
padding:10px 20px;
font-size:16px;
}

#message{
margin-top:20px;
color:green;
font-weight:bold;
}
</style>

</head>

<body>

<h2>Feedback Page</h2>

<button id="feedbackBtn">Submit Feedback</button>

<p id="message"></p>

<script>

const btn = document.getElementById("feedbackBtn");
const message = document.getElementById("message");

btn.addEventListener("click", function(){
message.textContent = "Thank you! Your feedback has been submitted.";
});

</script>

</body>
</html>
